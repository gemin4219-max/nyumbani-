name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-14

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🍎 Select Xcode 15.4 (has iOS 17 SDK pre-installed)
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: 📦 Install npm dependencies
        run: npm install

      - name: 🛠️ Generate Native iOS Project (Expo Prebuild)
        run: npx expo prebuild --platform ios --no-install

      - name: 💎 Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: 🔨 Build Unsigned App
        run: |
          xcodebuild \
            -workspace ios/nyumbaniapp.xcworkspace \
            -scheme nyumbaniapp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath derivedData \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            build | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: 📦 Package into IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find derivedData/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 | head -1)
          mv "$APP_PATH" Payload/
          zip -r nyumbani-app-unsigned.ipa Payload

      - name: 🚀 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyumbani-app-unsigned-ipa
          path: nyumbani-app-unsigned.ipa
          retention-days: 7
