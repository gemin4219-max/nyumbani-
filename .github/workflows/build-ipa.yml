name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-15

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🍎 List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: 🍎 Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks

      - name: 📦 Install npm dependencies
        run: npm install

      - name: 💎 Install xcpretty
        run: gem install xcpretty

      - name: 🛠️ Generate Native iOS Project (Expo Prebuild)
        run: npx expo prebuild --platform ios --no-install

      - name: 💎 Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: 🔨 Build Unsigned App
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/nyumbaniapp.xcworkspace \
            -scheme nyumbaniapp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath derivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            build 2>&1 | xcpretty --color

      - name: 📦 Package into IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find derivedData/Build/Products -name "*.app" -maxdepth 3 | head -1)
          echo "Found app at: $APP_PATH"
          mv "$APP_PATH" Payload/
          zip -r nyumbani-app-unsigned.ipa Payload

      - name: 🚀 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyumbani-app-unsigned-ipa
          path: nyumbani-app-unsigned.ipa
          retention-days: 7

