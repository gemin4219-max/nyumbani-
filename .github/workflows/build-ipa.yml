name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🍎 Show Xcode version
        run: xcodebuild -version

      - name: 📦 Install npm dependencies
        run: npm install

      - name: 🛠️ Generate Native iOS Project (clean prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: 💎 Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: 🔨 Archive App (unsigned)
        run: |
          xcodebuild archive \
            -workspace ios/Nyumbani.xcworkspace \
            -scheme Nyumbani \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Nyumbani.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: 📦 Package into unsigned IPA
        run: |
          mkdir -p Payload
          cp -r "$RUNNER_TEMP/Nyumbani.xcarchive/Products/Applications/Nyumbani.app" Payload/
          zip -r nyumbani-app-unsigned.ipa Payload/

      - name: 🚀 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyumbani-app-unsigned-ipa
          path: nyumbani-app-unsigned.ipa
          retention-days: 7


